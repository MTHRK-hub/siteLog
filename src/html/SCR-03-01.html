<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>現場記録簿 - 友達一覧</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/SCR-00-01.css" />
  <link rel="stylesheet" href="../css/SCR-03-01.css" />
</head>
<body class="friend-list-page">
  <div class="app">
    <div class="card">
      <div class="filter-row">
        <select id="friend-filter" class="filter-select">
          <option value="">全件表示</option>
          <option value="20代">20代</option>
          <option value="予定あり">予定あり</option>
          <option value="出会った場所">出会った場所</option>
          <option value="提案対象">提案対象</option>
        </select>
      </div>
      <div class="filter-row" id="filter-sub-row" hidden>
        <select id="friend-filter-sub" class="filter-select">
          <option value=""></option>
        </select>
      </div>
      <p class="info-text" id="friend-load-status"></p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>名前</th>
              <th>年齢</th>
              <th>性別</th>
              <th>職業</th>
            </tr>
          </thead>
          <tbody id="friend-list-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="../js/common.js"></script>
  <script src="../js/SCR-03-01.js"></script>
</body>
</html>
