<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>現場記録簿 - 支出実績一覧</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/SCR-00-01.css" />
  <link rel="stylesheet" href="../css/SCR-07-04.css" />
</head>
<body class="expenditure-list-page">
  <div class="app">
    <div class="card">
      <h3 class="exp-list-title" id="exp-list-title"></h3>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>日付</th>
              <th>カテゴリ</th>
              <th>種別</th>
              <th>内容</th>
              <th>金額</th>
              <th>備考</th>
              <th></th>
              <th></th>
            </tr>
          </thead>
          <tbody id="exp-list-body"></tbody>
        </table>
      </div>

      <p class="info-text" id="exp-list-status"></p>
    </div>
  </div>

  <div id="delete-dialog" class="dialog-overlay" hidden>
    <div class="dialog-box">
      <p class="dialog-msg" id="delete-dialog-msg"></p>
      <div class="dialog-actions">
        <button type="button" class="btn btn-danger" id="btn-delete-ok">はい</button>
        <button type="button" class="btn btn-secondary" id="btn-delete-cancel">キャンセル</button>
      </div>
    </div>
  </div>

  <script>
    window.SITELOG_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzslsgfnlEFzyDA6W4ysgPJYz8w2PDOG_bCZh5qCy7lQvnfyYa9rR-kkLZGGXENb81D/exec";
  </script>
  <script src="../js/common.js"></script>
  <script src="../js/SCR-07-04.js"></script>
</body>
</html>
