<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>現場記録簿 - イベント一覧</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/SCR-00-01.css" />
  <link rel="stylesheet" href="../css/SCR-08-01.css" />
</head>

<body class="event-list-page">
  <div class="app">
    <div class="card">
      <div class="event-controls">
        <select id="month-filter" class="month-select"></select>
      </div>

      <div id="event-content" hidden>
        <div class="event-fee-row">
          <p class="event-fee-total" id="event-fee-total-row"></p>
        </div>
      </div>
      <label class="event-check-label" id="chk-participation-label">
        <input type="checkbox" id="chk-participation" disabled />
        参加予定
      </label>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>日付</th>
              <th>時間</th>
              <th>イベント名</th>
              <th>詳細</th>
            </tr>
          </thead>
          <tbody id="event-list-body"></tbody>
        </table>
      </div>


      <div class="event-delete-row" id="event-delete-row" hidden>
        <button type="button" class="btn btn-danger" id="btn-delete-old">過去データ削除</button>
      </div>

      <p class="info-text" id="event-load-status"></p>
    </div>
  </div>

  <div id="delete-dialog" class="dialog-overlay" hidden>
    <div class="dialog-box">
      <p class="dialog-msg" id="delete-dialog-msg"></p>
      <div class="dialog-actions">
        <button type="button" class="btn btn-danger" id="btn-delete-ok">はい</button>
        <button type="button" class="btn btn-secondary" id="btn-delete-cancel">キャンセル</button>
      </div>
    </div>
  </div>

  <script>
    window.SITELOG_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzslsgfnlEFzyDA6W4ysgPJYz8w2PDOG_bCZh5qCy7lQvnfyYa9rR-kkLZGGXENb81D/exec";
  </script>
  <script src="../js/common.js"></script>
  <script src="../js/SCR-08-01.js"></script>
</body>

</html>
