<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>現場記録簿 - 友達詳細</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/SCR-00-01.css" />
  <link rel="stylesheet" href="../css/SCR-03-02.css" />

<body class="friend-detail-page">
  <div class="app">
    <div class="card">
      <dl class="detail-rows" id="friend-detail-content"></dl>
      <div class="detail-actions">
        <button type="button" class="btn btn-danger" id="btn-friend-delete">削除</button>
      </div>
      <div id="delete-dialog" class="dialog-overlay" hidden>
        <div class="dialog-box">
          <p id="delete-dialog-msg" class="dialog-msg"></p>
          <div class="dialog-actions">
            <button type="button" class="btn btn-danger" id="btn-delete-confirm">はい</button>
            <button type="button" class="btn btn-secondary" id="btn-delete-cancel">キャンセル</button>
          </div>
          <p id="delete-error" class="error-msg" role="alert"></p>
        </div>
      </div>
    </div>
  </div>
  <script>
    window.SITELOG_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzslsgfnlEFzyDA6W4ysgPJYz8w2PDOG_bCZh5qCy7lQvnfyYa9rR-kkLZGGXENb81D/exec";
  </script>
  <script src="../js/common.js"></script>
  <script src="../js/SCR-03-02.js"></script>
</body>
</html>
