<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>現場記録簿 - ユーザー登録</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/SCR-00-01.css" />
  <link rel="stylesheet" href="../css/SCR-A2-02.css" />
</head>
<body class="user-register-page">
  <div class="app">
    <div class="card">
      <form id="user-register-form" class="form-grid" novalidate>
        <label>ユーザーID<input name="ユーザーID" required autocomplete="off" /></label>
        <label>ユーザー名<input name="ユーザー名" required /></label>
        <label>生年月日<input name="生年月日" type="date" /></label>
        <fieldset class="radio-fieldset">
          <legend class="radio-legend">管理者権限</legend>
          <div class="radio-group">
            <label class="radio-label"><input type="radio" name="管理者フラグ" value="0" checked />なし</label>
            <label class="radio-label"><input type="radio" name="管理者フラグ" value="1" />あり</label>
          </div>
        </fieldset>
        <p id="user-register-error" class="error-msg" role="alert"></p>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">登録</button>
          <button type="button" class="btn btn-secondary" id="btn-register-cancel">キャンセル</button>
        </div>
      </form>

      <div id="confirm-dialog" class="dialog-overlay" hidden>
        <div class="dialog-box">
          <p class="dialog-msg">登録しますか？</p>
          <div class="dialog-actions">
            <button type="button" class="btn btn-primary" id="btn-confirm-ok">はい</button>
            <button type="button" class="btn btn-secondary" id="btn-confirm-cancel">キャンセル</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    window.SITELOG_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzslsgfnlEFzyDA6W4ysgPJYz8w2PDOG_bCZh5qCy7lQvnfyYa9rR-kkLZGGXENb81D/exec";
  </script>
  <script src="../js/common.js"></script>
  <script src="../js/SCR-A2-02.js"></script>
</body>
</html>
