<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>現場記録簿 - 現場記録編集</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/SCR-00-01.css" />
  <link rel="stylesheet" href="../css/SCR-04-04.css" />
</head>
<body class="site-form-page">
  <div class="app">
    <div class="card">
      <form id="site-edit-form" class="form-grid" novalidate>
        <label>日付<input name="日付" type="date" required /></label>
        <label>項目
          <select name="項目" id="select-item">
            <option value="">選択してください</option>
            <option value="つくる">つくる</option>
            <option value="1:1">1:1</option>
            <option value="紹介">紹介</option>
            <option value="MTG">MTG</option>
            <option value="その他">その他</option>
          </select>
        </label>
        <label>出会った相手<input name="出会った相手" id="input-partner" /></label>
        <label>メモ<textarea name="メモ"></textarea></label>
        <label>ToDo<textarea name="ToDo"></textarea></label>
        <p id="site-edit-error" class="error-msg" role="alert"></p>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">更新</button>
          <button type="button" class="btn btn-secondary" id="btn-edit-cancel">キャンセル</button>
        </div>
      </form>
      <div id="confirm-dialog" class="dialog-overlay" hidden>
        <div class="dialog-box">
          <p class="dialog-msg">更新しますか？</p>
          <div class="dialog-actions">
            <button type="button" class="btn btn-primary" id="btn-confirm-ok">はい</button>
            <button type="button" class="btn btn-secondary" id="btn-confirm-cancel">キャンセル</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    window.SITELOG_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzslsgfnlEFzyDA6W4ysgPJYz8w2PDOG_bCZh5qCy7lQvnfyYa9rR-kkLZGGXENb81D/exec";
  </script>
  <script src="../js/common.js"></script>
  <script src="../js/SCR-04-04.js"></script>
</body>
</html>
