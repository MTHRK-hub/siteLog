<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>現場記録簿 - ユーザー一覧</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/SCR-00-01.css" />
  <link rel="stylesheet" href="../css/SCR-A2-01.css" />
</head>
<body class="user-list-page">
  <div class="app">
    <div class="card">
      <p class="info-text" id="user-load-status"></p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ユーザーID</th>
              <th>ユーザー名</th>
              <th>管理権限</th>
              <th>初期化</th>
              <th>削除</th>
            </tr>
          </thead>
          <tbody id="user-list-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 削除確認ダイアログ -->
  <div id="delete-dialog" class="dialog-overlay" hidden>
    <div class="dialog-box">
      <p class="dialog-msg" id="delete-dialog-msg"></p>
      <div class="dialog-actions">
        <button type="button" class="btn btn-danger" id="btn-delete-ok">はい</button>
        <button type="button" class="btn btn-secondary" id="btn-delete-cancel">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- 初期化確認ダイアログ -->
  <div id="reset-dialog" class="dialog-overlay" hidden>
    <div class="dialog-box">
      <p class="dialog-msg" id="reset-dialog-msg"></p>
      <div class="dialog-actions">
        <button type="button" class="btn btn-danger" id="btn-reset-ok">はい</button>
        <button type="button" class="btn btn-secondary" id="btn-reset-cancel">キャンセル</button>
      </div>
    </div>
  </div>

  <script>
    window.SITELOG_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzslsgfnlEFzyDA6W4ysgPJYz8w2PDOG_bCZh5qCy7lQvnfyYa9rR-kkLZGGXENb81D/exec";
  </script>
  <script src="../js/common.js"></script>
  <script src="../js/SCR-A2-01.js"></script>
</body>
</html>
