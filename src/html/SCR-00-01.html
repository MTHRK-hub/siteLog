<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>現場記録簿 - ヘッダ</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/SCR-00-01.css" />
  <style>
    /* ヘッダフレーム用オーバーライド */
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      /* safe-area は上・左右のみ。下はコンテンツフレームに任せる */
      padding: max(6px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) 0 max(12px, env(safe-area-inset-left));
    }
    /* header-root も高さを継承させてテーブルが全高を使えるようにする */
    #header-root {
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="header-root"></div>
  <script src="../js/SCR-00-01.js"></script>
</body>
</html>
